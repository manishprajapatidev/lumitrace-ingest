name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_USER: lumitrace
          POSTGRES_PASSWORD: lumitrace
          POSTGRES_DB: lumitrace
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U lumitrace -d lumitrace"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://lumitrace:lumitrace@localhost:5432/lumitrace
      JWT_SECRET: ci-test-secret-ci-test-secret-ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run migrate
      - run: npm run test:coverage
      - uses: SonarSource/sonarqube-scan-action@v3
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
