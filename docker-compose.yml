services:
  timescaledb:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: lumitrace
      POSTGRES_PASSWORD: lumitrace
      POSTGRES_DB: lumitrace
    ports:
      - '5432:5432'
    volumes:
      - tsdata:/home/postgres/pgdata/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lumitrace -d lumitrace']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://lumitrace:lumitrace@timescaledb:5432/lumitrace
      JWT_SECRET: ${JWT_SECRET:-please-change-me-please-change-me-32+chars}
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - '8080:8080'

volumes:
  tsdata: {}
